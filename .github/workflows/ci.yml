name: CI

on:
  push:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff
      - name: Lint
        run: ruff check app training tests
      - name: Unit tests
        run: pytest
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t smart-interview-intelligence:ci .
